<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <style>
    :root {
      --bg: #0d1117;
      --text: #e6edf3;
      --accent: #f97316;
      --border: #1e293b;
      --input: #1e293b;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      padding: 1rem;
      text-align: center;
      background: var(--border);
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    .input-group {
      display: flex;
      padding: 0.5rem;
      background: var(--border);
    }
    input[type="text"] {
      flex: 1;
      padding: 0.5rem;
      border: none;
      background: var(--input);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }
    button {
      background: var(--accent);
      border: none;
      color: var(--bg);
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #ea580d;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      background: var(--border);
      padding: 0.5rem;
      margin: 0.25rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 0.25rem;
    }
    li.completed {
      text-decoration: line-through;
      opacity: 0.5;
    }
    .task-text {
      flex: 1;
      margin-right: 0.5rem;
    }
    .delete-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 1rem;
      cursor: pointer;
    }
    .filters {
      display: flex;
      justify-content: center;
      padding: 0.5rem;
      background: var(--border);
    }
    .filters button {
      background: none;
      border: none;
      color: var(--text);
      margin: 0 0.5rem;
      cursor: pointer;
      font-weight: bold;
    }
    .filters button.active {
      color: var(--accent);
    }
    .footer {
      padding: 0.5rem;
      text-align: center;
      background: var(--border);
      font-size: 0.9rem;
    }
    .clear-btn {
      background: var(--accent);
      color: var(--bg);
      padding: 0.3rem 0.6rem;
      border: none;
      border-radius: 0.25rem;
      cursor: pointer;
    }
    .empty {
      text-align: center;
      padding: 2rem;
      color: var(--text);
    }
    @media (max-width: 600px) {
      .input-group {
        flex-direction: column;
      }
      .input-group input {
        margin-bottom: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Todo List</h1>
  </header>
  <div class="input-group">
    <input type="text" id="task-input" placeholder="Add a new task..." />
    <button onclick="addTask()">Add</button>
  </div>
  <ul id="task-list"></ul>
  <div class="filters">
    <button onclick="filterTasks('all')" class="active">All</button>
    <button onclick="filterTasks('active')">Active</button>
    <button onclick="filterTasks('completed')">Completed</button>
  </div>
  <div class="footer">
    <span id="item-count">0 items left</span>
    <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
  </div>
  <div class="empty" id="empty-state">No tasks yet. Add one above!</div>

  <script>
    const taskList = document.getElementById('task-list');
    const taskInput = document.getElementById('task-input');
    const itemCount = document.getElementById('item-count');
    const emptyState = document.getElementById('empty-state');
    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function renderTasks() {
      taskList.innerHTML = '';
      emptyState.style.display = tasks.length ? 'none' : 'block';
      let activeCount = 0;
      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.className = task.completed ? 'completed' : '';
        li.innerHTML = `
          <span class="task-text"><input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${index})"> ${task.text}</span>
          <button class="delete-btn" onclick="deleteTask(${index})">X</button>
        `;
        taskList.appendChild(li);
        if (!task.completed) activeCount++;
      });
      itemCount.textContent = `${activeCount} item${activeCount !== 1 ? 's' : ''} left`;
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (text === '') return;
      tasks.push({ text, completed: false });
      taskInput.value = '';
      saveTasks();
      renderTasks();
    }

    function toggleComplete(index) {
      tasks[index].completed = !tasks[index].completed;
      saveTasks();
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }

    function clearCompleted() {
      tasks = tasks.filter(t => !t.completed);
      saveTasks();
      renderTasks();
    }

    function filterTasks(filter) {
      document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.filters button[onclick="filterTasks('${filter}')"]`).classList.add('active');
      renderTasks();
    }

    taskInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    renderTasks();
  </script>
</body>
</html>
